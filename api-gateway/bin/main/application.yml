server:
  port: 9000

spring:
  application:
    name: api-gateway

  redis:
    host: localhost
    port: 6379

  cloud:
    gateway:

      httpclient:
        connect-timeout: 2000
        response-timeout: 3s

      discovery:
        locator:
          enabled: true

      routes:

        - id: otp-service
          uri: lb://OTP-SERVICE
          predicates:
            - Path=/api/otp/**
          filters:
            - RewritePath=/api/otp/(?<segment>.*), /otp/${segment}

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: payment-intent-service
          uri: lb://PAYMENT-INTENT-SERVICE
          predicates:
            - Path=/api/payment-intent/**
          filters:

            - name: Retry
              args:
                retries: 3
                methods: POST

            - name: CircuitBreaker
              args:
                name: paymentIntentCB
                fallbackUri: forward:/fallback/payment-intent
                statusCodes:
                  - 500

            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

# RESILIENCE4J
resilience4j:
  circuitbreaker:
    instances:
      paymentIntentCB:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  timelimiter:
    instances:
      paymentIntentCB:
        timeoutDuration: 2s

# EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

